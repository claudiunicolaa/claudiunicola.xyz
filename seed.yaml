goal: Extend static personal website (v1, GitHub Pages) with a self-hosted blog at
  /posts using markdown sources, pandoc, and Node.js build pipeline, optimized for
  SEO/GEO to increase online visibility as a Software Engineering specialist
task_type: code
brownfield_context:
  project_type: brownfield
  context_references:
  - path: generate.sh
    role: primary
    summary: Existing build/deploy script that runs resume export, fixes URLs, and
      git pushes - blog build step must be added here
  - path: index.html
    role: primary
    summary: Current resume page served at root - needs Blog navigation link injected
  - path: blog/index.html
    role: primary
    summary: Existing redirect to dev.to that must be replaced by new /posts blog
  - path: package.json
    role: primary
    summary: Root package.json with jsonresume-theme-classy dependency - blog npm
      packages must be added here
  - path: resume.json
    role: reference
    summary: Resume data file used by existing resume export in generate.sh
  existing_patterns:
  - Static HTML served from repo root via GitHub Pages (master branch)
  - generate.sh as single build/deploy entry point
  - Node.js used for resume export (resume CLI tool)
  - Root-level package.json for dependency management
  existing_dependencies:
  - jsonresume-theme-classy
  - resume-cli (implied by generate.sh resume export command)
  - Node.js runtime
  - sed for post-processing
constraints:
- All static - no server-side runtime
- Served via GitHub Pages from repo root (master branch)
- Pandoc required as local CLI dependency
- Node.js already available (used for resume export)
- Single build script (build-blog.js) integrated into existing generate.sh
- Replaces existing blog/ redirect to dev.to
- Base URL is https://claudiunicola.xyz
- No pagination
- No v2 (Next.js) integration
- No comments system
- No search functionality
- No automated CI/CD
- URL format must use clean URLs with trailing slash: /posts/<slug>/ (e.g. /posts/my-first-post/)
- Never use dated filenames (posts/YYYY-MM-DD-slug.html) or .html extensions in URLs
- Each post directory contains an index.html (e.g. posts/my-first-post/index.html serves as /posts/my-first-post/)
- Tag pages follow same pattern: /posts/tags/<tag>/ served from posts/tags/<tag>/index.html
acceptance_criteria:
- Markdown files in _posts/ with YAML frontmatter (title, date, summary, tags, keywords,
  og_image) are converted to HTML in posts/
- Individual posts output at posts/<slug>/index.html with pandoc-converted content
  wrapped in Handlebars template, served as /posts/<slug>/
- Each post includes OG tags, Twitter cards, JSON-LD BlogPosting schema, canonical
  URL (/posts/<slug>/), and meta keywords
- Posts have clickable tag badges linking to /posts/tags/<tag>/
- posts/index.html auto-generated with reverse chronological listing showing title,
  date, summary plus tags section
- Tag listing pages generated at posts/tags/<tag>/index.html for each unique tag,
  served as /posts/tags/<tag>/
- sitemap.xml generated at repo root listing resume page, all posts (/posts/<slug>/),
  and all tag pages (/posts/tags/<tag>/)
- robots.txt generated at repo root with sitemap reference
- RSS feed generated at posts/feed.xml with correct canonical post URLs (/posts/<slug>/)
- Blog navigation link injected on resume index.html pointing to /posts
- Home navigation link on all blog pages pointing to /
- Dependencies (js-yaml, Handlebars, RSS library) added to root package.json
- build-blog.js invoked from generate.sh alongside existing resume export
- Styling is clean, readable, professional, minimal standalone CSS
ontology_schema:
  name: BlogPost
  description: Domain model for a static blog post with SEO metadata, used to generate
    HTML pages, index listings, tag pages, sitemap, and RSS feed
  fields:
  - name: title
    type: string
    description: Post title displayed in heading and meta tags
    required: true
  - name: date
    type: string
    description: ISO date (YYYY-MM-DD) used for sorting and display, NOT included in URL
    required: true
  - name: summary
    type: string
    description: 1-2 sentence description for index listing and meta description
    required: true
  - name: tags
    type: array
    description: List of topic tags for categorization and tag listing pages
    required: true
  - name: keywords
    type: array
    description: List of SEO keywords for meta keywords tag
    required: true
  - name: og_image
    type: string
    description: URL to Open Graph image for social sharing
    required: true
  - name: slug
    type: string
    description: URL-friendly identifier derived from filename (minus date prefix),
      used as /posts/<slug>/ — no date in URL
    required: true
  - name: source_path
    type: string
    description: Path to source markdown file in _posts directory
    required: true
  - name: output_path
    type: string
    description: Path to generated HTML file (posts/<slug>/index.html)
    required: true
  - name: content_html
    type: string
    description: Pandoc-converted HTML body of the post
    required: true
evaluation_principles:
- name: seo_completeness
  description: Every post must have complete OG tags, Twitter cards, JSON-LD BlogPosting,
    canonical URL, and meta keywords
  weight: 0.9
- name: clean_url_compliance
  description: All generated URLs must use /posts/<slug>/ and /posts/tags/<tag>/ format
    with trailing slash; no .html extensions, no dates in URLs
  weight: 1.0
- name: build_reliability
  description: build-blog.js must handle edge cases (missing frontmatter fields, empty
    _posts dir, special characters in slugs) without crashing
  weight: 0.8
- name: output_correctness
  description: Generated HTML must be valid, all internal links must resolve, sitemap
    URLs must use clean /posts/<slug>/ format
  weight: 0.9
- name: code_simplicity
  description: Build script should be maintainable and use standard well-known packages
    (js-yaml, Handlebars, RSS library)
  weight: 0.6
- name: visual_quality
  description: Posts and index pages must have clean, readable, professional styling
    appropriate for Software Engineering personal brand
  weight: 0.7
- name: feed_validity
  description: RSS feed and sitemap.xml must conform to their respective XML schemas
  weight: 0.8
- name: integration_safety
  description: Changes to generate.sh and index.html must not break existing resume
    export functionality
  weight: 0.9
exit_conditions:
- name: build_succeeds
  description: build-blog.js runs without errors and generates all expected output files
  criteria: All HTML files exist in posts/<slug>/index.html structure, sitemap.xml
    and robots.txt exist at root, feed.xml exists in posts/
- name: clean_urls_verified
  description: All generated URLs follow /posts/<slug>/ pattern
  criteria: No .html extensions in any internal links; canonical URLs use trailing
    slash format; sitemap entries use /posts/<slug>/ format
- name: seo_markup_present
  description: Every generated post HTML contains required SEO elements
  criteria: OG tags, Twitter cards, JSON-LD, canonical URL (/posts/<slug>/), meta
    description, meta keywords all present in HTML
- name: navigation_works
  description: Cross-navigation links are functional
  criteria: Blog link on resume page points to /posts, Home links on blog pages point
    to /, tag badges link to /posts/tags/<tag>/
- name: index_correct
  description: Posts index page lists all posts correctly
  criteria: All posts appear in reverse chronological order with title, date, summary;
    tags section lists all unique tags with links to /posts/tags/<tag>/
- name: existing_functionality_preserved
  description: Resume export and existing site features still work
  criteria: generate.sh completes successfully including resume export step
- name: blog_redirect_replaced
  description: Old /blog redirect is replaced
  criteria: blog/ directory no longer redirects to dev.to
